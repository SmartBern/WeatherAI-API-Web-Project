<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple WeatherAI API Web Project</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css">
  
</head>

<body>

  <div class="app">

    <div class="header">
      <h1>WeatherAI API Project</h1>
      <p>Real-time weather data &amp; forecasts</p>
    </div>

    <div class="key-row">
      <span class="key-label">API Key</span>
      <input
        type="password"
        id="apiKey"
        placeholder="Input wai_your_api_key_ here"
        autocomplete="off"
      />
    </div>

    <div class="search-row">
      <input type="text" id="latInput" placeholder="Latitude  e.g. 6.5244"/>
      <input type="text" id="lonInput" placeholder="Longitude e.g. 3.3792"/>
      <select id="unitsSelect">
        <option value="metric">°C Metric</option>
        <option value="imperial">°F Imperial</option>
      </select>
      <button onclick="fetchWeather()">Get weather</button>
      <button class="geo-btn" onclick="useMyLocation()" title="Detect my location">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          <circle cx="12" cy="12" r="8" stroke-dasharray="2 3"/>
        </svg>
        Detect
      </button>
    </div>

    <div id="errorBox" style="display:none;"></div>

    <div id="content">
      <div class="status">
        <p class="status-text">
          Enter your API key and coordinates (latitude and longitude) of a location, then click <strong>Get weather</strong>.
        </p>

        <p class="status-text">
          Or tap <strong>Detect</strong> to use your current location (Note: your location must be toggled on).
        </p>
      </div>
    </div>

  </div>


  <script src="/script.js"></script>

</body>
</html>
